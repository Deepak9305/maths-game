<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Math Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            margin: 0;
            overflow-x: hidden;
            overflow-y: auto;
            background-color: #312e81;
            /* Match indigo-900 theme */
            overscroll-behavior: none;
            /* Prevents pull-to-refresh on mobile */
            /* Respect Safe Area for notches */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            min-height: 100dvh;
        }

        #root {
            min-height: 100dvh;
        }

        /* Mobile app layout fix: allow min-h-screen to fit within the body padding */
        .min-h-screen {
            min-height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom)) !important;
        }

        .h-screen {
            height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom)) !important;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .animate-shake {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fade-in { animation: fade-in 0.3s ease-out both; }

        @keyframes bounce-in {
            0% { opacity: 0; transform: scale(0.85); }
            60% { opacity: 1; transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .animate-bounce-in { animation: bounce-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

        @keyframes fade-in-down {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-down { animation: fade-in-down 0.3s ease-out both; }

        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-slow { animation: pulse-slow 2s ease-in-out infinite; }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
    </style>
    <script type="importmap">
{

    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",

    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",

    "vite": "https://esm.sh/vite@^7.3.1",

    "@capacitor/core": "https://esm.sh/@capacitor/core@^8.0.2",
    "@capacitor/haptics": "https://esm.sh/@capacitor/haptics@^8.0.0",
    "@capacitor/app": "https://esm.sh/@capacitor/app@^8.0.0",
    "@capacitor/share": "https://esm.sh/@capacitor/share@^8.0.0",
    "@capacitor/splash-screen": "https://esm.sh/@capacitor/splash-screen@^8.0.0",
    "@capacitor/keyboard": "https://esm.sh/@capacitor/keyboard@^8.0.0",
    "@capacitor/screen-orientation": "https://esm.sh/@capacitor/screen-orientation@^8.0.0",
    "@capacitor/preferences": "https://esm.sh/@capacitor/preferences@^8.0.0",
    "@capacitor/clipboard": "https://esm.sh/@capacitor/clipboard@^8.0.0",
    "@capacitor-community/admob": "https://esm.sh/@capacitor-community/admob@^8.0.0"
  }
}

</head>
